<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Zelos Project</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
    <div id="blocklyDiv" style="height: 100vh; width: 100vw;"></div>

    <xml id="toolbox" style="display: none">
        <category name="Events" colour="#FFBF00">
            <block type="start"></block>
            <block type="tap"></block>
        </category>
        <category name="Motion" colour="#4C97FF">
            <block type="movesteps"></block>
            <block type="movex"></block>
            <block type="movey"></block>
            <block type="goto"></block>
        </category>
        <category name="looks" colour="#ff70f3">
            <block type="nextcos"></block>
        </category>
        <category name="controls" colour="#ffc72e">
            <block type="if"></block>
            <block type="forever_loop"></block>
        </category>
        <category name="logic" colour="#62f5d3">
            <block type="mouse"></block>
            <block type="key"></block>
        </category>
    </xml>

    <script src="blocks.js"></script>
    <script src="main.js"></script>
</body>
</html>
